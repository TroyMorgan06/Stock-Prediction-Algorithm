<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock AI picks</title>
  <style>
    :root {
      font-family: system-ui, Segoe UI, sans-serif;
      background: #0f1419;
      color: #e6edf3;
    }
    body { max-width: 980px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    .note {
      font-size: 0.8rem;
      color: #8b949e;
      margin: 0 0 1rem 0;
      padding: 0.5rem 0.65rem;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
    }
    .meta { color: #8b949e; font-size: 0.88rem; margin-bottom: 0.65rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 0.45rem 0.5rem; border-bottom: 1px solid #30363d; }
    th { color: #c9d1d9; font-weight: 600; text-align: left; }
    th.num, td.num { text-align: right; }
    tr.top td { background: rgba(46, 160, 67, 0.12); }
    .err { color: #f85149; font-size: 0.85rem; margin-top: 1rem; white-space: pre-wrap; }
    .num { font-variant-numeric: tabular-nums; }
    .sym { font-weight: 600; }
    button {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 0.65rem;
    }
    button:hover { background: #30363d; }
  </style>
</head>
<body>
  <h1>Daily plan (simple)</h1>
  <p class="note" id="disc">Loading…</p>
  <p class="meta" id="updated"></p>
  <button type="button" id="refresh">Refresh</button>
  <h2 style="font-size:1rem;margin:0.75rem 0 0.35rem 0;">Longs (live)</h2>
  <table style="margin-bottom:1rem;">
    <thead>
      <tr>
        <th>#</th>
        <th>Symbol</th>
        <th>Session date</th>
        <th class="num">Prior close</th>
        <th class="num">Projected close</th>
        <th class="num">Suggested $</th>
        <th class="num">P(up)</th>
        <th class="num">Pred 1d return</th>
      </tr>
    </thead>
    <tbody id="rows_longs"></tbody>
  </table>

  <h2 style="font-size:1rem;margin:0.75rem 0 0.35rem 0;">Shorts (paper for now)</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Symbol</th>
        <th>Session date</th>
        <th class="num">Prior close</th>
        <th class="num">Projected close</th>
        <th class="num">Suggested $</th>
        <th class="num">P(up)</th>
        <th class="num">Pred 1d return</th>
      </tr>
    </thead>
    <tbody id="rows_shorts"></tbody>
  </table>
  <div class="err" id="errors"></div>

  <script>
    function fmtFixed(v, d) {
      var n = Number(v);
      return Number.isFinite(n) ? n.toFixed(d) : "\u2014";
    }
    function fmtPct(v) {
      var n = Number(v);
      return Number.isFinite(n) ? (100 * n).toFixed(2) + "%" : "\u2014";
    }
    function td(cls, text) {
      var el = document.createElement("td");
      if (cls) el.className = cls;
      el.textContent = text;
      return el;
    }

    async function load() {
      var disc = document.getElementById("disc");
      var u = document.getElementById("updated");
      var tbL = document.getElementById("rows_longs");
      var tbS = document.getElementById("rows_shorts");
      var er = document.getElementById("errors");
      tbL.textContent = "";
      tbS.textContent = "";
      er.textContent = "";

      var url = location.protocol === "file:"
        ? "http://127.0.0.1:8765/predictions.json"
        : "/predictions.json";

      try {
        var r = await fetch(url, { cache: "no-store" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        var data = JSON.parse(await r.text());

        var plan = (data.trade_plan || {});
        var f = plan.filters || {};
        disc.textContent =
          "Longs are sized for a tiny live test. Shorts are paper-only unless you have margin + borrow. " +
          "Filter: P(up) ≥ " + (f.min_p_up ?? "?") + " and Pred 1d return ≥ " + (100*(f.min_pred_1d_return ?? 0)).toFixed(2) + "%.";

        u.textContent =
          "Updated (UTC): " + (data.updated_utc || "?");

        function addRow(tb, i, s) {
          var tr = document.createElement("tr");
          if (i === 0) tr.className = "top";

          tr.appendChild(td("", String(i + 1)));
          var tdSym = document.createElement("td");
          tdSym.className = "sym";
          tdSym.textContent = String(s.ticker != null ? s.ticker : "?");
          tr.appendChild(tdSym);
          tr.appendChild(td("", String(s.last_bar_date || "?")));
          tr.appendChild(td("num", fmtFixed(s.prior_close, 2)));
          tr.appendChild(td("num", fmtFixed(s.projected_close, 2)));
          tr.appendChild(td("num", fmtFixed(s.suggested_dollars, 2)));
          tr.appendChild(td("num", fmtFixed(s.proba_up, 3)));
          tr.appendChild(td("num", fmtPct(s.pred_return)));
          tb.appendChild(tr);
        }

        var longs = plan.longs || [];
        var shorts = plan.shorts || [];
        for (var i = 0; i < longs.length; i++) addRow(tbL, i, longs[i]);
        for (var i = 0; i < shorts.length; i++) addRow(tbS, i, shorts[i]);

        var errs = data.errors || [];
        if (errs.length) {
          er.textContent = errs.map(function (e) {
            return e.ticker + ": " + (e.error || "");
          }).join(" | ");
        }
      } catch (e) {
        disc.textContent = "";
        u.textContent = "Could not load predictions.";
        er.textContent = String(e.message || e);
      }
    }

    document.getElementById("refresh").addEventListener("click", load);
    load();
    setInterval(load, 60000);
  </script>
</body>
</html>
